<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Navigasi jQuery</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: #f4f7f6;
        }

        /* Styling Navigasi */
        nav {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        li {
            position: relative;
        }

        li a {
            display: block;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        li a:hover {
            background-color: #34495e;
        }

        /* Styling Dropdown (Sembunyi di awal) */
        .dropdown {
            display: none;
            position: absolute;
            background-color: #fff;
            min-width: 180px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
            flex-direction: column;
        }

        .dropdown li a {
            color: #333;
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
        }

        .dropdown li a:hover {
            background-color: #f1f1f1;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<nav>
    <ul>
        <li><a href="#">Beranda</a></li>
        <li class="has-dropdown">
            <a href="#">Layanan ▼</a>
            <ul class="dropdown">
                <li><a href="#">Web Design</a></li>
                <li><a href="#">Mobile App</a></li>
                <li><a href="#">Digital Marketing</a></li>
            </ul>
        </li>
        <li class="has-dropdown">
            <a href="#">Produk ▼</a>
            <ul class="dropdown">
                <li><a href="#">Software Kasir</a></li>
                <li><a href="#">Sistem Absensi</a></li>
            </ul>
        </li>
        <li><a href="#">Tentang Kami</a></li>
    </ul>
</nav>

<script>
$(document).ready(function(){
    // Fungsi jQuery untuk Dropdown
    $(".has-dropdown").hover(
        function() {
            // Saat kursor masuk (Mouse In)
            $(this).find(".dropdown").stop(true, true).slideDown(300);
        }, 
        function() {
            // Saat kursor keluar (Mouse Out)
            $(this).find(".dropdown").stop(true, true).slideUp(200);
        }
    );
});
</script>

</body>
</html>
