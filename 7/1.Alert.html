<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Alert</title>
    <style>
        /* Gaya untuk latar belakang gelap (Overlay) */
        .overlay {
            display: none; /* Sembunyi di awal */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 999;
        }

        /* Gaya Kotak Pesan Error */
        .alert-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
            border-top: 5px solid #ff4757; /* Garis merah tanda error */
            font-family: 'Segoe UI', sans-serif;
        }

        .alert-box h2 {
            margin: 0 0 10px;
            color: #ff4757;
        }

        .alert-box p {
            color: #2f3542;
            margin-bottom: 20px;
        }

        /* Tombol Close */
        .btn-close {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-close:hover {
            background: #ff6b81;
        }
    </style>
</head>
<body>

    <div id="customAlert" class="overlay">
        <div class="alert-box">
            <h2>Oops!</h2>
            <p>Terjadi kesalahan pada sistem.</p>
            <button class="btn-close" onclick="tutupAlert()">Tutup</button>
        </div>
    </div>

    <script>
        // Fungsi untuk menampilkan alert buatan saat halaman dimuat
        window.onload = function() {
            document.getElementById("customAlert").style.display = "block";
        };

        // Fungsi untuk menutup alert
        function tutupAlert() {
            document.getElementById("customAlert").style.display = "none";
        }
    </script>

</body>
</html>
