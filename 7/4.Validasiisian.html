<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validasi Masukan Modern</title>
    <style>
        /* Mengatur dasar halaman agar konten di tengah */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Kotak utama (Card) */
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Mengatur tampilan form agar rapi tanpa <pre> */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }

        /* Desain Input Text */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            box-sizing: border-box; /* Agar padding tidak merusak lebar */
            transition: border-color 0.3s;
            outline: none;
            font-size: 16px;
        }

        input[type="text"]:focus {
            border-color: #4a90e2;
        }

        /* Desain Tombol Kirim */
        input[type="button"] {
            width: 100%;
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        input[type="button"]:hover {
            background-color: #357abd;
        }

        input[type="button"]:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Validasi Data</h2>
        
        <form name="formku">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" name="nama" id="nama" placeholder="Masukkan nama Anda">
            </div>
            
            <input type="button" value="Kirim Data" onclick="ceknama(this.form)">
        </form>
    </div>

    <script language="javascript">
        function ceknama(form) {
            // Memeriksa apakah input pertama (indeks 0) kosong [cite: 82]
            if (form.elements[0].value == "") {
                alert("Nama harus dimasukkan"); 
                form.nama.focus(); 
                form.nama.select();
                return (false); 
            }
            // Jika terisi, tampilkan pesan terima kasih [cite: 91, 93]
            alert("Terima kasih, " + form.elements[0].value); 
            return (true); 
        }
    </script>

</body>
</html>
