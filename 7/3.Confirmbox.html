<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Confirm Box</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        /* Tombol Utama */
        .btn-trigger {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-trigger:hover {
            background-color: #0056b3;
        }

        /* Overlay Latar Belakang */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        /* Kotak Konfirmasi */
        .confirm-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            width: 320px;
            padding: 24px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        .confirm-box h3 {
            margin-top: 0;
            color: #333;
        }

        .confirm-box p {
            color: #666;
            margin-bottom: 25px;
        }

        /* Group Tombol */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .btn-ok {
            background-color: #e74c3c;
            color: white;
        }

        .btn-cancel {
            background-color: #ecf0f1;
            color: #7f8c8d;
        }

        .btn:hover {
            opacity: 0.9;
        }

        #demo {
            margin-top: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <h2>Modern Confirm Box</h2>
    <button class="btn-trigger" onclick="showConfirm()">Klik Ini</button>
    <p id="demo"></p>

    <div id="confirmOverlay" class="overlay">
        <div class="confirm-box">
            <h3>Konfirmasi</h3>
            <p>Apakah Anda yakin akan logout?</p>
            <div class="btn-group">
                <button class="btn btn-cancel" onclick="handleChoice(false)">Batal</button>
                <button class="btn btn-ok" onclick="handleChoice(true)">Logout</button>
            </div>
        </div>
    </div>

    <script>
        function showConfirm() {
            document.getElementById("confirmOverlay").style.display = "block";
        }

        function handleChoice(isOk) {
            var txt;
            if (isOk) {
                txt = "Anda mengklik OK (Logout)";
                // Anda bisa menambahkan logika redirect di sini
            } else {
                txt = "Anda mengklik Cancel.";
            }
            
            document.getElementById("demo").innerHTML = txt;
            document.getElementById("confirmOverlay").style.display = "none";
        }
    </script>
</body>
</html>
