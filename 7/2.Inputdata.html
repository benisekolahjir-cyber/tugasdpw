<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Modern</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
            color: #333;
        }

        h2 { margin-bottom: 20px; color: #4b6cb7; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: 0.3s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        button:hover { background: #764ba2; }

        #hasil {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #764ba2;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Input Data</h2>
        <input type="text" id="inputNama" placeholder="Masukkan nama anda...">
        <button onclick="tampilkanNama()">Sapa Saya!</button>
        <div id="hasil"></div>
    </div>

    <script>
        function tampilkanNama() {
            // Mengambil nilai dari input field
            var nama = document.getElementById("inputNama").value;
            var display = document.getElementById("hasil");

            if (nama.trim() !== "") {
                display.innerHTML = "Hallo, " + nama + "! ✨";
            } else {
                display.innerHTML = "<span style='color:red; font-size:0.9rem;'>Isi nama dulu ya!</span>";
            }
        }
    </script>

</body>
</html>
